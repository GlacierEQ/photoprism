version: "3.8"
# PhotoPrism Professional Production Stack
# Enhanced for security, monitoring, and high availability
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "5"
    compress: "true"
x-restart-policy: &default-restart-policy
  restart: unless-stopped
x-resource-limits: &default-resource-limits
  deploy:
    resources:
      limits:
        cpus: "${CPU_LIMIT:-2.0}"
        memory: "${MEMORY_LIMIT:-2G}"
      reservations:
        cpus: "${CPU_RESERVE:-0.5}"
        memory: "${MEMORY_RESERVE:-512M}"
x-healthcheck: &default-healthcheck
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 40s
services:
  # PhotoPrism Application
  photoprism:
    image: photoprism/photoprism:latest-brains
    container_name: photoprism
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      PHOTOPRISM_ADMIN_USER: "${PHOTOPRISM_ADMIN_USER:-admin}"
      PHOTOPRISM_ADMIN_PASSWORD: "${PHOTOPRISM_ADMIN_PASSWORD}"
      PHOTOPRISM_DATABASE_DRIVER: "mysql"
      PHOTOPRISM_DATABASE_SERVER: "mariadb:3306"
      PHOTOPRISM_DATABASE_NAME: "photoprism"
      PHOTOPRISM_DATABASE_USER: "photoprism"
      PHOTOPRISM_DATABASE_PASSWORD: "${PHOTOPRISM_DATABASE_PASSWORD}"
      PHOTOPRISM_SITE_URL: "${PHOTOPRISM_SITE_URL:-http://localhost:2342/}"
      PHOTOPRISM_SITE_TITLE: "${PHOTOPRISM_SITE_TITLE:-PhotoPrism}"
      PHOTOPRISM_LOG_LEVEL: "${PHOTOPRISM_LOG_LEVEL:-info}"
      PHOTOPRISM_READONLY: "${PHOTOPRISM_READONLY:-false}"
      PHOTOPRISM_WORKERS: "${PHOTOPRISM_WORKERS:-auto}"
      PHOTOPRISM_EXPERIMENTAL: "${PHOTOPRISM_EXPERIMENTAL:-true}"
      PHOTOPRISM_BRAINS: "${PHOTOPRISM_BRAINS:-true}"
      PHOTOPRISM_BRAINS_OBJECT_DETECTION: "${PHOTOPRISM_BRAINS_OBJECT_DETECTION:-true}"
      PHOTOPRISM_BRAINS_AESTHETIC_SCORING: "${PHOTOPRISM_BRAINS_AESTHETIC_SCORING:-true}"
      PHOTOPRISM_BRAINS_SCENE_UNDERSTANDING: "${PHOTOPRISM_BRAINS_SCENE_UNDERSTANDING:-true}"
      TZ: "${TZ:-UTC}"
    volumes:
      - photoprism-storage:/photoprism/storage
      - photoprism-originals:/photoprism/originals
      - photoprism-import:/photoprism/import
      - photoprism-brains:/photoprism/assets/brains
    ports:
      - "${PHOTOPRISM_PORT:-2342}:2342"
    user: "${PUID:-1000}:${PGID:-1000}"
    networks:
      - photoprism-internal
      - photoprism-web
    deploy:
      resources:
        limits:
          cpus: "${PHOTOPRISM_CPU_LIMIT:-2.0}"
          memory: "${PHOTOPRISM_MEMORY_LIMIT:-4G}"
        reservations:
          cpus: "${PHOTOPRISM_CPU_RESERVE:-0.5}"
          memory: "${PHOTOPRISM_MEMORY_RESERVE:-1G}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2342/api/v1/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging: *default-logging
    labels:
      - "com.photoprism.description=PhotoPrism App Server"
      - "com.photoprism.environment=${ENVIRONMENT:-production}"
      - "traefik.enable=true"
  mariadb:
    image: mariadb:10.11
    container_name: photoprism-mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      MYSQL_DATABASE: "photoprism"
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      MYSQL_DATABASE: "photoprism"
      MYSQL_USER: "photoprism"
      MYSQL_PASSWORD: "${PHOTOPRISM_DATABASE_PASSWORD}"
    volumes:
      - photoprism-mariadb:/var/lib/mysql
      - ./docker/config/mariadb:/etc/mysql/conf.d:ro
    command:
      - --innodb-buffer-pool-size=${MARIADB_BUFFER_POOL_SIZE:-512M}
      - --transaction-isolation=READ-COMMITTED
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max-connections=${MARIADB_MAX_CONNECTIONS:-512}
      - --innodb-rollback-on-timeout=OFF
      - --innodb-lock-wait-timeout=120
      - --innodb-file-per-table=1
      - --innodb-flush-method=O_DIRECT
    networks:
      - photoprism-internal
    user: "${MYSQL_USER_ID:-999}:${MYSQL_GROUP_ID:-999}"
    deploy:
      resources:
        limits:
          cpus: "${MARIADB_CPU_LIMIT:-1.0}"
          memory: "${MARIADB_MEMORY_LIMIT:-1G}"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging: *default-logging
    labels:
      !!merge <<: *default-healthcheck
  nginx:
    image: nginx:alpine
    container_name: photoprism-nginx
    restart: unless-stopped
    depends_on:
      photoprism:
        condition: service_healthy
    volumes:
    container_name: photoprism-nginx
    !!merge <<: *default-restart-policy
    depends_on:
      photoprism:
        condition: service_healthy
    volumes:
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      !!merge <<: *default-healthcheck
    deploy:
      resources:
        limits:
          cpus: "${CPU_LIMIT:-2.0}"
          memory: "${MEMORY_LIMIT:-2G}"
        reservations:
          cpus: "${CPU_RESERVE:-0.5}"
          memory: "${MEMORY_RESERVE:-512M}"
    logging: *default-logging
    labels:
      - "com.photoprism.description=PhotoPrism Reverse Proxy"
      - "com.photoprism.environment=${ENVIRONMENT:-production}"
  # Automated Backups

  backup:
    image: alpine:latest
    container_name: photoprism-backup
    depends_on:
      - mariadb
    volumes:
      - ./docker/backup:/backup
    networks:
      - photoprism-internal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "${CPU_LIMIT:-2.0}"
          memory: "${MEMORY_LIMIT:-2G}"
        reservations:
          cpus: "${CPU_RESERVE:-0.5}"
          memory: "${MEMORY_RESERVE:-512M}"
    logging: *default-logging
    labels: echo '0 2 * * * /backup/run-backup.sh >> /backup/logs/backup.log 2>&1' > /var/spool/cron/crontabs/root crond -f -d 8 "
    networks:
      - photoprism-internal
    restart: unless-stopped
    !!merge <<: *default-resource-limits
    logging: *default-logging
    labels:
      - "com.photoprism.description=PhotoPrism Backup Service"
      - "com.photoprism.environment=${ENVIRONMENT:-production}"
    # Prometheus for monitoring (optional)

    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "${CPU_LIMIT:-2.0}"
          memory: "${MEMORY_LIMIT:-2G}"
        reservations:
          cpus: "${CPU_RESERVE:-0.5}"
          memory: "${MEMORY_RESERVE:-512M}"
    logging: *default-logging
    labels:
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    networks:
      - photoprism-monitoring
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    restart: unless-stopped
    !!merge <<: *default-resource-limits
    logging: *default-logging
    labels:
      - "com.photoprism.description=PhotoPrism Monitoring"
      - "com.photoprism.environment=${ENVIRONMENT:-production}"
    profiles: ["monitoring"]
  # Node Exporter for system metrics (optional)

  node-exporter:
    image: prom/node-exporter:latest
    container_name: photoprism-node-exporter
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    restart: unless-stopped
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          cpus: "${CPU_LIMIT:-2.0}"
          memory: "${MEMORY_LIMIT:-2G}"
        reservations:
          cpus: "${CPU_RESERVE:-0.5}"
          memory: "${MEMORY_RESERVE:-512M}"
    logging: *default-logging
    labels:
  grafana:
    image: grafana/grafana:latest
    container_name: photoprism-grafana
    volumes:
      - ./docker/monitoring/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-piechart-panel
    networks:
      - photoprism-monitoring
      - photoprism-web
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    restart: unless-stopped
    depends_on:
      - prometheus
    !!merge <<: *default-resource-limits
    logging: *default-logging
    labels:
      - "com.photoprism.description=PhotoPrism Analytics"
      - "com.photoprism.environment=${ENVIRONMENT:-production}"
    profiles: ["monitoring"]
networks:
  photoprism-internal:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.28.0.0/16
  photoprism-web:
    driver: bridge
    ipam:
      config:
        - subnet: 172.29.0.0/16
  photoprism-monitoring:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/16
volumes:
  photoprism-storage:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PHOTOPRISM_DATA_PATH:-./data}/storage
  photoprism-originals:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PHOTOPRISM_DATA_PATH:-./data}/originals
  photoprism-import:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PHOTOPRISM_DATA_PATH:-./data}/import
  photoprism-brains:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PHOTOPRISM_DATA_PATH:-./data}/brains-models
  photoprism-mariadb:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PHOTOPRISM_DATA_PATH:-./data}/mysql
  prometheus_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PHOTOPRISM_DATA_PATH:-./data}/prometheus
  grafana_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PHOTOPRISM_DATA_PATH:-./data}/grafana
