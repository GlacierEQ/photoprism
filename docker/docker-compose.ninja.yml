version: "3.8"

# Global default environment settings
x-environment: &default-environment
  TZ: "${TZ:-UTC}"
  PHOTOPRISM_SITE_URL: "${PHOTOPRISM_SITE_URL:-http://localhost:2342/}"
  PHOTOPRISM_SITE_TITLE: "${PHOTOPRISM_SITE_TITLE:-PhotoPrism}"
  PHOTOPRISM_LOG_LEVEL: "${PHOTOPRISM_LOG_LEVEL:-info}"
  NINJA_TEAM_SIZE: "${NINJA_TEAM_SIZE:-4}"
  NINJA_RECURSION_DEPTH: "${NINJA_RECURSION_DEPTH:-2}"
  NINJA_BUILD_MODE: "${NINJA_BUILD_MODE:-parallel}"

# Health check defaults with faster intervals for Ninja deployments
x-healthcheck: &ninja-healthcheck
  interval: 15s
  timeout: 5s
  retries: 3
  start_period: 10s

# Resource limits with dynamic allocation for Ninja Team
x-resources: &ninja-resources
  deploy:
    resources:
      limits:
        cpus: "${NINJA_CPU_LIMIT:-0.5}"
        memory: "${NINJA_MEMORY_LIMIT:-512M}"
      reservations:
        cpus: "${NINJA_CPU_RESERVE:-0.1}"
        memory: "${NINJA_MEMORY_RESERVE:-128M}"

# Enhanced logging for Ninja deployments
x-logging: &ninja-logging
  driver: "json-file"
  options:
    max-size: "${LOG_MAX_SIZE:-10m}"
    max-file: "${LOG_MAX_FILES:-3}"
    compress: "true"
    tag: "ninja-{{.Name}}"

services:
  # Ninja Team Controller service
  ninja-controller:
    build:
      context: ..
      dockerfile: Dockerfile
    image: photoprism2-ninja:latest
    container_name: photoprism-ninja-controller
    environment:
      <<: *default-environment
      NODE_ENV: "${NODE_ENV:-production}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      NINJA_ROLE: "controller"
    volumes:
      - "../scripts:/app/scripts:ro"
      - "../config:/app/config:ro"
      - "../build/ninja:/app/build/ninja"
    command: ["bash", "/app/scripts/ninja-deploy.sh"]
    networks:
      - ninja_network
    <<: *ninja-resources
    logging: *ninja-logging

  # Ninja Team Worker services - dynamically created via docker-compose config
  ninja-worker-1:
    image: photoprism2-ninja:latest
    container_name: photoprism-ninja-worker-1
    environment:
      <<: *default-environment
      NODE_ENV: "${NODE_ENV:-production}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      NINJA_ROLE: "worker"
      NINJA_ID: "1"
      NINJA_SPECIALTY: "frontend"
    depends_on:
      - ninja-controller
    volumes:
      - "../build/ninja/ninja-1:/app/workspace"
      - "../config:/app/config:ro"
    networks:
      - ninja_network
    <<: *ninja-resources
    logging: *ninja-logging
    healthcheck:
      test: ["CMD", "bash", "-c", "test -f /app/workspace/status.json"]
      <<: *ninja-healthcheck

  ninja-worker-2:
    image: photoprism2-ninja:latest
    container_name: photoprism-ninja-worker-2
    environment:
      <<: *default-environment
      NODE_ENV: "${NODE_ENV:-production}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      NINJA_ROLE: "worker"
      NINJA_ID: "2"
      NINJA_SPECIALTY: "backend"
    depends_on:
      - ninja-controller
    volumes:
      - "../build/ninja/ninja-2:/app/workspace"
      - "../config:/app/config:ro"
    networks:
      - ninja_network
    <<: *ninja-resources
    logging: *ninja-logging
    healthcheck:
      test: ["CMD", "bash", "-c", "test -f /app/workspace/status.json"]
      <<: *ninja-healthcheck

  ninja-worker-3:
    image: photoprism2-ninja:latest
    container_name: photoprism-ninja-worker-3
    environment:
      <<: *default-environment
      NODE_ENV: "${NODE_ENV:-production}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      NINJA_ROLE: "worker"
      NINJA_ID: "3"
      NINJA_SPECIALTY: "database"
    depends_on:
      - ninja-controller
    volumes:
      - "../build/ninja/ninja-3:/app/workspace"
      - "../config:/app/config:ro"
    networks:
      - ninja_network
    <<: *ninja-resources
    logging: *ninja-logging
    healthcheck:
      test: ["CMD", "bash", "-c", "test -f /app/workspace/status.json"]
      <<: *ninja-healthcheck

  ninja-worker-4:
    image: photoprism2-ninja:latest
    container_name: photoprism-ninja-worker-4
    environment:
      <<: *default-environment
      NODE_ENV: "${NODE_ENV:-production}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      NINJA_ROLE: "worker"
      NINJA_ID: "4"
      NINJA_SPECIALTY: "infrastructure"
    depends_on:
      - ninja-controller
    volumes:
      - "../build/ninja/ninja-4:/app/workspace"
      - "../config:/app/config:ro"
    networks:
      - ninja_network
    <<: *ninja-resources
    logging: *ninja-logging
    healthcheck:
      test: ["CMD", "bash", "-c", "test -f /app/workspace/status.json"]
      <<: *ninja-healthcheck

  # Ninja Team Monitoring service
  ninja-monitor:
    image: photoprism2-ninja:latest
    container_name: photoprism-ninja-monitor
    profiles: ["monitoring"]
    environment:
      <<: *default-environment
      NODE_ENV: "${NODE_ENV:-production}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      NINJA_ROLE: "monitor"
      MONITORING_INTERVAL: "${MONITORING_INTERVAL:-10}"
    volumes:
      - "../build/ninja:/app/build/ninja"
      - "../docker/scripts/ninja-monitor.sh:/app/monitor.sh:ro"
    command: ["bash", "/app/monitor.sh"]
    depends_on:
      - ninja-controller
      - ninja-worker-1
      - ninja-worker-2
      - ninja-worker-3
      - ninja-worker-4
    networks:
      - ninja_network
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: "128M"
    logging: *ninja-logging

networks:
  ninja_network:
    driver: bridge
