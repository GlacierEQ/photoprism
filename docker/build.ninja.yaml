# Ninja Team Docker Build Configuration
# This file configures specialized builds for the Ninja Team deployment pattern

version: '1.0'

# Default build configuration
default:
  parallel: true
  timeout: 3600
  registry: docker.io
  repository: photoprism2
  cache: true
  security_scan: true
  prune: false

# Environment-specific configuration
environments:
  production:
    base_tag: latest
    build_args:
      NODE_ENV: production
      GO_ENV: production
      BUILD_MODE: release
    labels:
      environment: production
      tier: stable
    platforms:
      - linux/amd64
      - linux/arm64

  staging:
    base_tag: staging
    build_args:
      NODE_ENV: production
      GO_ENV: production
      BUILD_MODE: release
    labels:
      environment: staging
      tier: testing
    platforms:
      - linux/amd64

  development:
    base_tag: dev
    build_args:
      NODE_ENV: development
      GO_ENV: development
      BUILD_MODE: debug
    labels:
      environment: development
      tier: unstable
    platforms:
      - linux/amd64

# Ninja team specific build settings
ninja:
  team_size: 4
  stages:
    - name: prepare
      description: Prepare build environment
      timeout: 300
      ninja_id: 1
      skip_cache: false

    - name: frontend
      description: Build frontend assets
      timeout: 900
      ninja_id: 1
      skip_cache: false

    - name: backend
      description: Build backend binary
      timeout: 900
      ninja_id: 2
      skip_cache: false

    - name: security
      description: Security scanning
      timeout: 600
      ninja_id: 3
      skip_cache: true

    - name: package
      description: Create final image
      timeout: 600
      ninja_id: 4
      skip_cache: false

    - name: test
      description: Test image
      timeout: 600
      ninja_id: 3
      skip_cache: true

# Custom build hooks
hooks:
  pre_build:
    - script: scripts/pre-build-hook.sh
      timeout: 300

  post_build:
    - script: scripts/post-build-hook.sh
      timeout: 300

  on_failure:
    - script: scripts/build-failure-notify.sh
      timeout: 120

# Security scanning configuration
security:
  scanner: trivy
  severity: HIGH,CRITICAL
  fail_on_findings: false
  ignore_unfixed: true
  report_path: build/security-report.json

# Performance optimization
performance:
  parallel_downloads: true
  compression_level: 9
  layer_caching: true
  build_kit: true
  buildkit_inline_cache: true
  shared_cache_volume: true

# Monitoring configuration
monitoring:
  metrics_port: 9090
  log_level: info
  statsd_host: localhost
  statsd_port: 8125
  enable_prometheus: true
