version: "3.8"

# Global environment settings
x-environment: &default-environment
  TZ: "${TZ:-UTC}"
  LOG_LEVEL: "${LOG_LEVEL:-info}"
  NODE_ENV: "production"

# Resource constraints
x-resources: &production-resources
  resources:
    limits:
      memory: "${MEMORY_LIMIT:-1Gi}"
      cpu: "${CPU_LIMIT:-1000m}"
    requests:
      memory: "${MEMORY_REQUEST:-512Mi}"
      cpu: "${CPU_REQUEST:-100m}"

# Default security context
x-security-context: &default-security
  securityContext:
    runAsUser: 1000
    runAsGroup: 1000
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

# Default health check
x-health-check: &default-health
  livenessProbe:
    httpGet:
      path: /api/v1/health
      port: 8000
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /api/v1/readiness
      port: 8000
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

services:
  app:
    image: ${REGISTRY_URL:-docker.io}/${REPOSITORY:-photoprism2}:${IMAGE_TAG:-latest}
    container_name: photoprism2-app
    <<: *default-security
    <<: *default-health
    deploy: *production-resources
    environment:
      <<: *default-environment
      DATABASE_URL: postgres://${DB_USER:-photoprism}:${DB_PASSWORD:-password}@postgres:5432/${DB_NAME:-photoprism}
      STORAGE_PATH: /app/storage
      JWT_SECRET: ${JWT_SECRET}
      SESSION_SECRET: ${SESSION_SECRET}
    volumes:
      - app-storage:/app/storage
      - app-config:/app/config:ro
    ports:
      - name: http
        containerPort: 8000
        protocol: TCP
    labels:
      app.kubernetes.io/name: photoprism2
      app.kubernetes.io/component: backend
      app.kubernetes.io/part-of: photoprism2
      app.kubernetes.io/version: ${VERSION:-latest}
      app.kubernetes.io/managed-by: kubernetes
      prometheus.io/scrape: "true"
      prometheus.io/port: "8000"
      prometheus.io/path: "/metrics"

  postgres:
    image: postgres:14-alpine
    container_name: photoprism2-db
    <<: *default-security
    deploy: *production-resources
    environment:
      POSTGRES_USER: ${DB_USER:-photoprism}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-photoprism}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - postgres-config:/etc/postgresql:ro
    ports:
      - name: postgres
        containerPort: 5432
        protocol: TCP
    livenessProbe:
      exec:
        command: ["pg_isready", "-U", "${DB_USER:-photoprism}"]
      initialDelaySeconds: 30
      periodSeconds: 30
      timeoutSeconds: 5
      failureThreshold: 3
    readinessProbe:
      exec:
        command: ["pg_isready", "-U", "${DB_USER:-photoprism}"]
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    labels:
      app.kubernetes.io/name: postgres
      app.kubernetes.io/component: database
      app.kubernetes.io/part-of: photoprism2
      app.kubernetes.io/managed-by: kubernetes

  prometheus:
    image: prom/prometheus:v2.39.1
    container_name: photoprism2-prometheus
    <<: *default-security
    deploy: *production-resources
    environment:
      <<: *default-environment
    volumes:
      - prometheus-data:/prometheus
      - prometheus-config:/etc/prometheus:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
      - --web.enable-lifecycle
    ports:
      - name: prometheus
        containerPort: 9090
        protocol: TCP
    livenessProbe:
      httpGet:
        path: /-/healthy
        port: 9090
      initialDelaySeconds: 30
      periodSeconds: 30
      timeoutSeconds: 10
      failureThreshold: 3
    readinessProbe:
      httpGet:
        path: /-/ready
        port: 9090
      initialDelaySeconds: 15
      periodSeconds: 15
      timeoutSeconds: 5
      failureThreshold: 3
    labels:
      app.kubernetes.io/name: prometheus
      app.kubernetes.io/component: monitoring
      app.kubernetes.io/part-of: photoprism2
      app.kubernetes.io/managed-by: kubernetes

  grafana:
    image: grafana/grafana:9.2.0
    container_name: photoprism2-grafana
    <<: *default-security
    deploy: *production-resources
    environment:
      <<: *default-environment
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: "grafana-clock-panel,grafana-simple-json-datasource"
      GF_SERVER_ROOT_URL: https://dashboard.${DOMAIN:-photoprism2.local}
    volumes:
      - grafana-data:/var/lib/grafana
      - grafana-config:/etc/grafana/provisioning:ro
    ports:
      - name: grafana
        containerPort: 3000
        protocol: TCP
    livenessProbe:
      httpGet:
        path: /api/health
        port: 3000
      initialDelaySeconds: 30
      periodSeconds: 30
      timeoutSeconds: 10
      failureThreshold: 3
    readinessProbe:
      httpGet:
        path: /api/health
        port: 3000
      initialDelaySeconds: 15
      periodSeconds: 15
      timeoutSeconds: 5
      failureThreshold: 3
    labels:
      app.kubernetes.io/name: grafana
      app.kubernetes.io/component: monitoring
      app.kubernetes.io/part-of: photoprism2
      app.kubernetes.io/managed-by: kubernetes

volumes:
  app-storage:
    name: photoprism2-app-storage
  app-config:
    name: photoprism2-app-config
  postgres-data:
    name: photoprism2-postgres-data
  postgres-config:
    name: photoprism2-postgres-config
  prometheus-data:
    name: photoprism2-prometheus-data
  prometheus-config:
    name: photoprism2-prometheus-config
  grafana-data:
    name: photoprism2-grafana-data
  grafana-config:
    name: photoprism2-grafana-config
