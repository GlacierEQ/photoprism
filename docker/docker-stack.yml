version: "3.8"
# Global default environment settings
x-environment: &default-environment
  TZ: "${TZ:-UTC}"
  PHOTOPRISM_SITE_URL: "${PHOTOPRISM_SITE_URL:-https://photos.example.com/}"
  PHOTOPRISM_SITE_TITLE: "${PHOTOPRISM_SITE_TITLE:-PhotoPrism}"
  PHOTOPRISM_LOG_LEVEL: "${PHOTOPRISM_LOG_LEVEL:-info}"
# Health check defaults

x-healthcheck: &default-healthcheck
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 60s
# Default logging configuration

x-logging: &default-logging
  driver: "${LOG_DRIVER:-json-file}"
  options:
    max-size: "${LOG_MAX_SIZE:-10m}"
    max-file: "${LOG_MAX_FILES:-3}"
    tag: "{{.Name}}"
services:
  photoprism:
    image: photoprism/photoprism:latest-brains
    deploy:
      mode: replicated
      replicas: ${PHOTOPRISM_REPLICAS:-1}
      update_config:
        order: start-first
        failure_action: rollback
        delay: 10s
      rollback_config:
        parallelism: 1
        delay: 10s
        failure_action: pause
        monitor: 60s
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      resources:
        limits:
          cpus: "${PHOTOPRISM_CPU_LIMIT:-2}"
          memory: "${PHOTOPRISM_MEMORY_LIMIT:-4G}"
        reservations:
          cpus: "${PHOTOPRISM_CPU_RESERVE:-0.5}"
          memory: "${PHOTOPRISM_MEMORY_RESERVE:-1G}"
      placement:
        constraints:
          - node.role == worker
    environment:
      !!merge <<: *default-environment
      PHOTOPRISM_ADMIN_USER: "${PHOTOPRISM_ADMIN_USER:-admin}"
      PHOTOPRISM_ADMIN_PASSWORD_FILE: "/run/secrets/photoprism_admin_password"
      PHOTOPRISM_DATABASE_DRIVER: "mysql"
      PHOTOPRISM_DATABASE_SERVER: "mariadb:3306"
      PHOTOPRISM_DATABASE_NAME: "${MYSQL_DATABASE:-photoprism}"
      PHOTOPRISM_DATABASE_USER: "${MYSQL_USER:-photoprism}"
      PHOTOPRISM_DATABASE_PASSWORD_FILE: "/run/secrets/photoprism_db_password"
      PHOTOPRISM_READONLY: "${PHOTOPRISM_READONLY:-false}"
      PHOTOPRISM_WORKERS: "${PHOTOPRISM_WORKERS:-auto}"
      PHOTOPRISM_EXPERIMENTAL: "${PHOTOPRISM_EXPERIMENTAL:-true}"
      PHOTOPRISM_BRAINS: "${PHOTOPRISM_BRAINS:-true}"
      PHOTOPRISM_DETECTION_MODE: "${PHOTOPRISM_DETECTION_MODE:-default}"
      PHOTOPRISM_AUTO_DETECT_QUALITY: "${PHOTOPRISM_AUTO_DETECT_QUALITY:-1}"
      PHOTOPRISM_DISABLE_WEB_DAV: "${PHOTOPRISM_DISABLE_WEB_DAV:-false}"
      PHOTOPRISM_HTTP_COMPRESSION: "${PHOTOPRISM_HTTP_COMPRESSION:-gzip}"
      PHOTOPRISM_HTTP_HOST: "0.0.0.0"
    volumes:
      - storage:/photoprism/storage
      - originals:/photoprism/originals
      - import:/photoprism/import
      - assets:/photoprism/assets
    networks:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2342/api/v1/status", "||", "exit", "1"]
      !!merge <<: *default-healthcheck
    logging: *default-logging
    secrets:
      - photoprism_admin_password
      - photoprism_db_password
  mariadb:
    image: mariadb:10.11
    deploy:
      mode: replicated
      replicas: 1
      update_config:
        parallelism: 1
        order: stop-first
        failure_action: rollback
        delay: 10s
      rollback_config:
        parallelism: 1
        delay: 5s
        failure_action: pause
        monitor: 60s
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 5
        window: 60s
      resources:
        limits:
          cpus: "${MARIADB_CPU_LIMIT:-1}"
          memory: "${MARIADB_MEMORY_LIMIT:-1G}"
        reservations:
          cpus: "${MARIADB_CPU_RESERVE:-0.2}"
          memory: "${MARIADB_MEMORY_RESERVE:-512M}"
      placement:
        constraints:
          - node.role == worker
        preferences:
          - spread: node.labels.zone
    environment:
      MYSQL_ROOT_PASSWORD_FILE: "/run/secrets/mariadb_root_password"
      MYSQL_DATABASE: "${MYSQL_DATABASE:-photoprism}"
      MYSQL_USER: "${MYSQL_USER:-photoprism}"
      MYSQL_PASSWORD_FILE: "/run/secrets/photoprism_db_password"
    command:
      - --innodb-buffer-pool-size=${MARIADB_BUFFER_POOL_SIZE:-512M}
      - --transaction-isolation=READ-COMMITTED
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max-connections=${MARIADB_MAX_CONNECTIONS:-512}
      - --innodb-rollback-on-timeout=OFF
      - --innodb-lock-wait-timeout=120
      - --innodb-file-per-table=1
      - --innodb-flush-method=O_DIRECT
      - --skip-name-resolve
    volumes:
      - mariadb:/var/lib/mysql
      - ./config/mariadb:/etc/mysql/conf.d:ro
    networks:
      - backend
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "--silent"]
      !!merge <<: *default-healthcheck
    logging: *default-logging
    secrets:
      - mariadb_root_password
      - photoprism_db_password
  traefik:
    image: traefik:v2.10
    command:
      - "--api.insecure=false"
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.swarmMode=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=frontend"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=${SSL_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--accessLog=true"
      - "--accessLog.filePath=/var/log/traefik/access.log"
      - "--accessLog.bufferingSize=100"
      - "--log.level=${TRAEFIK_LOG_LEVEL:-INFO}"
    deploy:
      mode: global
      placement:
        constraints:
          - node.role == manager
      update_config:
        parallelism: 1
        delay: 10s
        order: stop-first
      restart_policy:
        condition: any
        delay: 5s
        window: 60s
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.dashboard.rule=Host(`traefik.${DOMAIN}`)"
        - "traefik.http.routers.dashboard.service=api@internal"
        - "traefik.http.routers.dashboard.entrypoints=websecure"
        - "traefik.http.routers.dashboard.tls.certresolver=letsencrypt"
        - "traefik.http.routers.dashboard.middlewares=traefik-auth"
        - "traefik.http.middlewares.traefik-auth.basicauth.users=${TRAEFIK_AUTH}"
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - traefik-logs:/var/log/traefik
    networks:
      - frontend
    logging: *default-logging
  prometheus:
    image: prom/prometheus
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      resources:
        limits:
          cpus: "0.5"
          memory: "512M"
    volumes:
      - ./prometheus:/etc/prometheus
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    networks:
      - monitoring
      - backend
    logging: *default-logging
  grafana:
    image: grafana/grafana
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.grafana.rule=Host(`grafana.${DOMAIN}`)"
        - "traefik.http.routers.grafana.entrypoints=websecure"
        - "traefik.http.routers.grafana.tls.certresolver=letsencrypt"
        - "traefik.http.services.grafana.loadbalancer.server.port=3000"
      resources:
        limits:
          cpus: "0.5"
          memory: "512M"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-piechart-panel,grafana-worldmap-panel
      - GF_SERVER_DOMAIN=${DOMAIN}
      - GF_SERVER_ROOT_URL=https://grafana.${DOMAIN}
    networks:
      - monitoring
      - frontend
    logging: *default-logging
  node-exporter:
    image: prom/node-exporter
    deploy:
      mode: global
      resources:
        limits:
          cpus: "0.1"
          memory: "128M"
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - monitoring
    logging: *default-logging
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    deploy:
      mode: global
      resources:
        limits:
          cpus: "0.1"
          memory: "128M"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - monitoring
    logging: *default-logging
networks:
  frontend:
    driver: overlay
    attachable: true
    driver_opts:
      encrypted: "true"
  backend:
    driver: overlay
    attachable: false
    driver_opts:
      encrypted: "true"
  monitoring:
    driver: overlay
    attachable: false
volumes:
  storage:
    driver: ${VOLUME_DRIVER:-local}
    driver_opts:
      type: ${VOLUME_TYPE:-none}
      o: bind
      device: ${DATA_PATH:-/var/lib/photoprism}/storage
  originals:
    driver: ${VOLUME_DRIVER:-local}
    driver_opts:
      type: ${VOLUME_TYPE:-none}
      o: bind
      device: ${DATA_PATH:-/var/lib/photoprism}/originals
  import:
    driver: ${VOLUME_DRIVER:-local}
    driver_opts:
      type: ${VOLUME_TYPE:-none}
      o: bind
      device: ${DATA_PATH:-/var/lib/photoprism}/import
  assets:
    driver: ${VOLUME_DRIVER:-local}
    driver_opts:
      type: ${VOLUME_TYPE:-none}
      o: bind
      device: ${DATA_PATH:-/var/lib/photoprism}/assets
  mariadb:
    driver: ${VOLUME_DRIVER:-local}
    driver_opts:
      type: ${VOLUME_TYPE:-none}
      o: bind
      device: ${DATA_PATH:-/var/lib/photoprism}/mysql
  letsencrypt:
    driver: ${VOLUME_DRIVER:-local}
    driver_opts:
      type: ${VOLUME_TYPE:-none}
      o: bind
      device: ${DATA_PATH:-/var/lib/photoprism}/letsencrypt
  prometheus-data:
    driver: ${VOLUME_DRIVER:-local}
    driver_opts:
      type: ${VOLUME_TYPE:-none}
      o: bind
      device: ${DATA_PATH:-/var/lib/photoprism}/prometheus
  grafana-data:
    driver: ${VOLUME_DRIVER:-local}
    driver_opts:
      type: ${VOLUME_TYPE:-none}
      o: bind
      device: ${DATA_PATH:-/var/lib/photoprism}/grafana
  traefik-logs:
    driver: ${VOLUME_DRIVER:-local}
    driver_opts:
      type: ${VOLUME_TYPE:-none}
      o: bind
      device: ${DATA_PATH:-/var/lib/photoprism}/traefik/logs
secrets:
  photoprism_admin_password:
    external: true
  photoprism_db_password:
    external: true
  mariadb_root_password:
    external: true
