version: "3.8"

# Global default environment settings
x-environment: &default-environment
  TZ: "${TZ:-UTC}"
  PHOTOPRISM_SITE_URL: "${PHOTOPRISM_SITE_URL:-http://localhost:2342/}"
  PHOTOPRISM_SITE_TITLE: "${PHOTOPRISM_SITE_TITLE:-PhotoPrism}"
  PHOTOPRISM_LOG_LEVEL: "${PHOTOPRISM_LOG_LEVEL:-info}"

# Health check defaults
x-healthcheck: &default-healthcheck
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 30s

# Resource limits
x-resources: &default-resources
  deploy:
    resources:
      limits:
        cpus: "${CPU_LIMIT:-2}"
        memory: "${MEMORY_LIMIT:-2G}"
      reservations:
        cpus: "${CPU_RESERVE:-0.5}"
        memory: "${MEMORY_RESERVE:-512M}"

# Default logging configuration
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "${LOG_MAX_SIZE:-10m}"
    max-file: "${LOG_MAX_FILES:-3}"
    compress: "true"

services:
  photoprism:
    image: ${DOCKER_IMAGE_NAME:-photoprism2}:${DOCKER_IMAGE_TAG:-latest}
    build:
      context: .
      args:
        - BUILD_MODE=${BUILD_MODE:-production}
    container_name: photoprism
    depends_on:
      mariadb:
        condition: service_healthy
    ports:
      - "${PHOTOPRISM_PORT:-2342}:2342"
    environment:
      <<: *default-environment
      PHOTOPRISM_ADMIN_USER: "${PHOTOPRISM_ADMIN_USER:-admin}"
      PHOTOPRISM_ADMIN_PASSWORD: "${PHOTOPRISM_ADMIN_PASSWORD}"
      PHOTOPRISM_DATABASE_DRIVER: "mysql"
      PHOTOPRISM_DATABASE_SERVER: "mariadb:3306"
      PHOTOPRISM_DATABASE_NAME: "${MYSQL_DATABASE:-photoprism}"
      PHOTOPRISM_DATABASE_USER: "${MYSQL_USER:-photoprism}"
      PHOTOPRISM_DATABASE_PASSWORD: "${PHOTOPRISM_DATABASE_PASSWORD}"
      PHOTOPRISM_READONLY: "${PHOTOPRISM_READONLY:-false}"
      PHOTOPRISM_WORKERS: "${PHOTOPRISM_WORKERS:-auto}"
      PHOTOPRISM_EXPERIMENTAL: "${PHOTOPRISM_EXPERIMENTAL:-true}"
      PHOTOPRISM_BRAINS: "${PHOTOPRISM_BRAINS:-true}"
      PHOTOPRISM_BRAINS_OBJECT_DETECTION: "${PHOTOPRISM_BRAINS_OBJECT_DETECTION:-true}"
      PHOTOPRISM_BRAINS_AESTHETIC_SCORING: "${PHOTOPRISM_BRAINS_AESTHETIC_SCORING:-true}"
      PHOTOPRISM_BRAINS_SCENE_UNDERSTANDING: "${PHOTOPRISM_BRAINS_SCENE_UNDERSTANDING:-true}"
      PHOTOPRISM_DETECT_NSFW: "${PHOTOPRISM_DETECT_NSFW:-false}"
      PHOTOPRISM_UPLOAD_NSFW: "${PHOTOPRISM_UPLOAD_NSFW:-true}"
      PHOTOPRISM_PUBLIC: "${PHOTOPRISM_PUBLIC:-false}"
      TERM: xterm-256color
      COLORTERM: truecolor
      PHOTOPRISM_ORIGINALS_LIMIT: "${PHOTOPRISM_ORIGINALS_LIMIT:-5000}"
      PHOTOPRISM_HTTP_COMPRESSION: "${PHOTOPRISM_HTTP_COMPRESSION:-gzip}"
    volumes:
      - "${PHOTOPRISM_DATA_PATH:-./data}/storage:/photoprism/storage"
      - "${PHOTOPRISM_DATA_PATH:-./data}/originals:/photoprism/originals"
      - "${PHOTOPRISM_DATA_PATH:-./data}/import:/photoprism/import"
      - "${PHOTOPRISM_DATA_PATH:-./data}/brains-models:/photoprism/assets/brains"
    restart: unless-stopped
    user: "${PUID:-1000}:${PGID:-1000}"
    networks:
      - photoprism_network
    <<: *default-resources
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-f",
          "http://localhost:2342/api/v1/status",
          "||",
          "exit",
          "1",
        ]
      <<: *default-healthcheck
    logging: *default-logging
    secrets:
      - photoprism_admin_password
      - photoprism_db_password
    tty: true
    stdin_open: true
    security_opt:
      - seccomp:unconfined
      - apparmor:unconfined

  mariadb:
    image: mariadb:10.11
    container_name: mariadb
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      MYSQL_DATABASE: "${MYSQL_DATABASE:-photoprism}"
      MYSQL_USER: "${MYSQL_USER:-photoprism}"
      MYSQL_PASSWORD: "${PHOTOPRISM_DATABASE_PASSWORD}"
    command:
      - --innodb-buffer-pool-size=${MARIADB_BUFFER_POOL_SIZE:-512M}
      - --transaction-isolation=READ-COMMITTED
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max-connections=${MARIADB_MAX_CONNECTIONS:-512}
      - --innodb-rollback-on-timeout=OFF
      - --innodb-lock-wait-timeout=120
      - --innodb-file-per-table=1
      - --innodb-flush-method=O_DIRECT
    volumes:
      - "${PHOTOPRISM_DATA_PATH:-./data}/mysql:/var/lib/mysql"
      - "./docker/config/mariadb:/etc/mysql/conf.d:ro"
    restart: unless-stopped
    user: "${MYSQL_USER_ID:-999}:${MYSQL_GROUP_ID:-999}"
    networks:
      - photoprism_network
    deploy:
      resources:
        limits:
          cpus: "${MARIADB_CPU_LIMIT:-1}"
          memory: "${MARIADB_MEMORY_LIMIT:-1G}"
        reservations:
          cpus: "${MARIADB_CPU_RESERVE:-0.2}"
          memory: "${MARIADB_MEMORY_RESERVE:-256M}"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "--silent"]
      <<: *default-healthcheck
    logging: *default-logging
    secrets:
      - mariadb_root_password
      - photoprism_db_password
    tty: true
    stdin_open: true

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_VERSION: "${NODE_VERSION:-16}"
        GO_VERSION: "${GO_VERSION:-1.19}"
    container_name: photoprism2-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - "${PHOTOPRISM_DATA_PATH:-./data}/photoprism2-storage:/app/storage"
      - "./config:/app/config:ro"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - DATABASE_URL=postgres://${DB_USER:-photoprism}:${DB_PASSWORD:-password}@postgres:5432/${DB_NAME:-photoprism}
      - STORAGE_PATH=/app/storage
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - JWT_SECRET=${JWT_SECRET}
      - SESSION_SECRET=${SESSION_SECRET}
      - TERM=xterm-256color
      - COLORTERM=truecolor
      - PS1='\[\033[1;36m\]photoprism2\[\033[0m\]:\[\033[1;34m\]\w\[\033[0m\]$ '
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/api/v1/health"]
      <<: *default-healthcheck
    logging: *default-logging
    networks:
      - photoprism_network
    deploy:
      resources:
        limits:
          cpus: "${APP_CPU_LIMIT:-1}"
          memory: "${APP_MEMORY_LIMIT:-1G}"
    tty: true
    stdin_open: true

  postgres:
    image: postgres:14-alpine
    container_name: photoprism2-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DB_USER:-photoprism}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-password}
      - POSTGRES_DB=${DB_NAME:-photoprism}
      - PGDATA=/var/lib/postgresql/data/pgdata
      - TERM=xterm-256color
    volumes:
      - "${PHOTOPRISM_DATA_PATH:-./data}/postgres:/var/lib/postgresql/data"
      - "./docker/config/postgres:/docker-entrypoint-initdb.d:ro"
    networks:
      - photoprism_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-photoprism}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "${POSTGRES_CPU_LIMIT:-1}"
          memory: "${POSTGRES_MEMORY_LIMIT:-1G}"
    tty: true
    stdin_open: true

  # Optional Traefik reverse proxy for SSL/TLS support - using official image
  traefik:
    image: traefik:v2.10
    container_name: photoprism-traefik
    profiles: ["with-traefik"]
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--api.dashboard=true"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "${PHOTOPRISM_DATA_PATH:-./data}/letsencrypt:/letsencrypt"
      - "./docker/traefik:/etc/traefik/dynamic:ro"
    deploy:
      resources:
        limits:
          cpus: "${TRAEFIK_CPU_LIMIT:-0.5}"
          memory: "${TRAEFIK_MEMORY_LIMIT:-256M}"
    logging: *default-logging
    networks:
      - photoprism_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.middlewares=auth"
      - "traefik.http.middlewares.auth.basicauth.users=${TRAEFIK_AUTH:-admin:$$apr1$$5Hy3Y4K7$$JvPgLk/CKJ/5Zv1j2Ouj41}" # Default: admin/admin

  # Optional Watchtower service to automatically update containers
  watchtower:
    image: containrrr/watchtower
    container_name: photoprism-watchtower
    profiles: ["with-watchtower"]
    environment:
      WATCHTOWER_CLEANUP: "${WATCHTOWER_CLEANUP:-true}"
      WATCHTOWER_POLL_INTERVAL: "${WATCHTOWER_POLL_INTERVAL:-86400}" # 24 hours
      WATCHTOWER_NOTIFICATION_URL: "${WATCHTOWER_NOTIFICATION_URL:-}"
      TZ: "${TZ:-UTC}"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
    networks:
      - photoprism_network
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "${WATCHTOWER_CPU_LIMIT:-0.2}"
          memory: "${WATCHTOWER_MEMORY_LIMIT:-128M}"

  # Optional Prometheus for metrics collection
  prometheus:
    image: prom/prometheus
    container_name: photoprism-prometheus
    profiles: ["monitoring"]
    volumes:
      - "./docker/prometheus:/etc/prometheus"
      - "${PHOTOPRISM_DATA_PATH:-./data}/prometheus:/prometheus"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    networks:
      - photoprism_network
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "${PROMETHEUS_CPU_LIMIT:-0.5}"
          memory: "${PROMETHEUS_MEMORY_LIMIT:-512M}"

  # Optional Grafana for monitoring dashboards
  grafana:
    image: grafana/grafana
    container_name: photoprism-grafana
    profiles: ["monitoring"]
    depends_on:
      - prometheus
    volumes:
      - "./docker/grafana/provisioning:/etc/grafana/provisioning"
      - "${PHOTOPRISM_DATA_PATH:-./data}/grafana:/var/lib/grafana"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    networks:
      - photoprism_network
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "${GRAFANA_CPU_LIMIT:-0.5}"
          memory: "${GRAFANA_MEMORY_LIMIT:-512M}"

  # Optional backup service
  backup:
    image: alpine:latest
    container_name: photoprism-backup
    profiles: ["with-backup"]
    volumes:
      - "${PHOTOPRISM_DATA_PATH:-./data}:/data:ro"
      - "${BACKUP_PATH:-./backups}:/backups"
      - "./docker/scripts/backup.sh:/backup.sh:ro"
    environment:
      - BACKUP_RETENTION_COUNT=${BACKUP_RETENTION_COUNT:-7}
      - TZ=${TZ:-UTC}
    entrypoint: ["/bin/sh", "/backup.sh"]
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "256M"

volumes:
  postgres-data:
    driver: local

networks:
  photoprism_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
          gateway: 172.28.0.1

# Docker secrets for sensitive data
secrets:
  photoprism_admin_password:
    file: ${PHOTOPRISM_ADMIN_PASSWORD_FILE:-./docker/secrets/photoprism_admin_password.txt}
  photoprism_db_password:
    file: ${PHOTOPRISM_DB_PASSWORD_FILE:-./docker/secrets/photoprism_db_password.txt}
  mariadb_root_password:
    file: ${MARIADB_ROOT_PASSWORD_FILE:-./docker/secrets/mariadb_root_password.txt}
